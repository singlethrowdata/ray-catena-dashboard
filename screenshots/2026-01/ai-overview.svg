<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" font-family="Arial,sans-serif">
  <rect width="760" height="400" fill="#fff"/>
  <!-- AI Overview container -->
  <rect x="0" y="0" width="760" height="400" rx="12" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <!-- Header gradient bar -->
  <defs>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4285F4;stop-opacity:0.08"/>
      <stop offset="50%" style="stop-color:#9C27B0;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#EA4335;stop-opacity:0.05"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="760" height="56" rx="12 12 0 0" fill="url(#aiGrad)"/>
  <!-- Sparkle icon (simplified) -->
  <path d="M22,28 L26,20 L30,28 L38,32 L30,36 L26,44 L22,36 L14,32 Z" fill="#4285F4" opacity="0.9"/>
  <path d="M26,18 L27.5,14 L29,18 L33,20 L29,22 L27.5,26 L26,22 L22,20 Z" fill="#9C27B0" opacity="0.7"/>
  <!-- AI Overview label -->
  <text x="46" y="37" fill="#202124" font-size="17" font-weight="700">AI Overview</text>
  <!-- Sources row -->
  <text x="680" y="37" fill="#1a73e8" font-size="12" text-anchor="end">3 sources</text>
  <!-- Divider -->
  <rect x="16" y="56" width="728" height="1" fill="#e0e0e0"/>
  <!-- AI generated text -->
  <text x="24" y="84" fill="#202124" font-size="14" font-weight="600">Ray Catena Edison</text>
  <text x="24" y="106" fill="#4d5156" font-size="13">Ray Catena Edison is a Mercedes-Benz dealership located at 400 US Route 1 in Edison,</text>
  <text x="24" y="124" fill="#4d5156" font-size="13">New Jersey. It is part of the Ray Catena Motor Car Corporation, one of the largest</text>
  <text x="24" y="142" fill="#4d5156" font-size="13">Mercedes-Benz dealer groups in the United States. The dealership offers new and</text>
  <text x="24" y="160" fill="#4d5156" font-size="13">certified pre-owned Mercedes-Benz vehicles, a full-service repair center, and financing.</text>
  <text x="24" y="178" fill="#4d5156" font-size="13">It holds a 4.8-star rating with over 1,200 reviews and is consistently ranked among</text>
  <text x="24" y="196" fill="#4d5156" font-size="13">the top-performing Mercedes-Benz dealers in the Northeast region.</text>
  <!-- Show more -->
  <text x="24" y="222" fill="#1a73e8" font-size="13" font-weight="500">Show more ▾</text>
  <!-- Divider -->
  <rect x="16" y="238" width="728" height="1" fill="#e0e0e0"/>
  <!-- Sources -->
  <text x="24" y="260" fill="#70757a" font-size="12" font-weight="600">SOURCES</text>
  <!-- Source 1 -->
  <rect x="24" y="272" width="210" height="64" rx="8" fill="#f8f9fa" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="34" y="282" width="28" height="28" rx="4" fill="#EA4335"/>
  <text x="48" y="302" fill="white" font-size="13" font-weight="bold" text-anchor="middle">G</text>
  <text x="70" y="292" fill="#202124" font-size="12" font-weight="600">raycatenaedison.com</text>
  <text x="70" y="308" fill="#70757a" font-size="11">Official dealer website</text>
  <!-- Source 2 -->
  <rect x="248" y="272" width="210" height="64" rx="8" fill="#f8f9fa" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="258" y="282" width="28" height="28" rx="4" fill="#4285F4"/>
  <text x="272" y="302" fill="white" font-size="11" font-weight="bold" text-anchor="middle">W</text>
  <text x="294" y="292" fill="#202124" font-size="12" font-weight="600">Wikipedia</text>
  <text x="294" y="308" fill="#70757a" font-size="11">Ray Catena Motor Car Corp.</text>
  <!-- Source 3 -->
  <rect x="472" y="272" width="210" height="64" rx="8" fill="#f8f9fa" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="482" y="282" width="28" height="28" rx="4" fill="#34A853"/>
  <text x="496" y="302" fill="white" font-size="11" font-weight="bold" text-anchor="middle">C</text>
  <text x="518" y="292" fill="#202124" font-size="12" font-weight="600">cars.com</text>
  <text x="518" y="308" fill="#70757a" font-size="11">Dealer reviews &amp; ratings</text>
  <!-- Feedback row -->
  <text x="24" y="368" fill="#70757a" font-size="12">Was this helpful?</text>
  <rect x="140" y="354" width="52" height="24" rx="12" fill="white" stroke="#dadce0" stroke-width="1"/>
  <text x="166" y="371" fill="#4d5156" font-size="12" text-anchor="middle">👍 Yes</text>
  <rect x="202" y="354" width="48" height="24" rx="12" fill="white" stroke="#dadce0" stroke-width="1"/>
  <text x="226" y="371" fill="#4d5156" font-size="12" text-anchor="middle">👎 No</text>
  <!-- Watermark -->
  <text x="736" y="392" fill="#e0e0e0" font-size="10" text-anchor="end">January 2026</text>
</svg>